<!DOCTYPE html>
<html>
<body>
<input type="file" id="file">
<script>
const ctx = new AudioContext();

(async () => {
  const worklet = `
 class PDMPlayer extends AudioWorkletProcessor {
  constructor() {
    super();
    this.data = [];
    this.pos = 0;

    this.OSR = 64; // PDM のオーバーサンプリング比

    // CIC 3段
    this.int1 = 0;
    this.int2 = 0;
    this.int3 = 0;

    this.comb1 = 0;
    this.comb2 = 0;
    this.comb3 = 0;

    this.port.onmessage = e => {
      this.data = e.data;
      this.pos = 0;
    };
  }

  process(_, outputs) {
    const out = outputs[0][0];

    for (let i = 0; i < out.length; i++) {

      // OSR 分まとめて処理
      for (let j = 0; j < this.OSR; j++) {
        if (this.pos >= this.data.length) break;

        const bit = this.data[this.pos++] ? 1 : -1;

        // Integrator (加算だけ)
        this.int1 += bit;
        this.int2 += this.int1;
        this.int3 += this.int2;
      }

      // Comb (差分だけ)
      const c1 = this.int3 - this.comb1;
      const c2 = c1 - this.comb2;
      const c3 = c2 - this.comb3;

      this.comb1 = this.int3;
      this.comb2 = c1;
      this.comb3 = c2;

      // 正規化
      out[i] = c3 / 1000000;
    }

    return true;
  }
}

registerProcessor("pdm-player", PDMPlayer);

  `;

  const blob = new Blob([worklet], { type: "application/javascript" });
  await ctx.audioWorklet.addModule(URL.createObjectURL(blob));

  const node = new AudioWorkletNode(ctx, "pdm-player");
  node.connect(ctx.destination);

  document.getElementById("file").onchange = async e => {
    const buf = await e.target.files[0].arrayBuffer();
    const bytes = new Uint8Array(buf);

    // バイト → 1bit 展開
    const bits = new Uint8Array(bytes.length * 8);
    let p = 0;
    for (let b of bytes) {
      for (let i = 0; i < 8; i++) {
        bits[p++] = (b >> (7 - i)) & 1;
      }
    }

    node.port.postMessage(bits);
    ctx.resume();
  };
})();
</script>
</body>
</html>
