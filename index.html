<!DOCTYPE html>
<html>
<body>

<input type="file" id="file">

<script>
const ctx = new AudioContext();

(async () => {

const worklet = `
class PDMPlayer extends AudioWorkletProcessor {

  constructor() {
    super();

    this.data = null;
    this.pos = 0;

    this.OSR = 64;

    // CIC 3段
    this.int1 = 0;
    this.int2 = 0;
    this.int3 = 0;

    this.comb1 = 0;
    this.comb2 = 0;
    this.comb3 = 0;

    // 定期リセット用
    this.counter = 0;
    this.RESET_INTERVAL = 1 << 4; // 約1677万bit

    this.port.onmessage = e => {
      this.data = e.data;
      this.pos = 0;

      this.int1 = 0;
      this.int2 = 0;
      this.int3 = 0;

      this.comb1 = 0;
      this.comb2 = 0;
      this.comb3 = 0;

      this.counter = 0;
    };
  }

  process(inputs, outputs) {

    const out = outputs[0][0];

    if (!this.data) {
      out.fill(0);
      return true;
    }

    for (let i = 0; i < out.length; i++) {

      for (let j = 0; j < this.OSR; j++) {

        if (this.pos >= this.data.length) {
          out[i] = 0;
          continue;
        }

        const bit = this.data[this.pos++] ? 1 : -1;

        // CIC Integrator
        this.int1 += bit;
        this.int2 += this.int1;
        this.int3 += this.int2;

        this.counter++;

        // 定期リセット
        if (this.counter >= this.RESET_INTERVAL) {

          this.int1 = 0;
          this.int2 = 0;
          this.int3 = 0;

          this.comb1 = 0;
          this.comb2 = 0;
          this.comb3 = 0;

          this.counter = 0;
        }
      }

      // CIC Comb
      const c1 = this.int3 - this.comb1;
      const c2 = c1 - this.comb2;
      const c3 = c2 - this.comb3;

      this.comb1 = this.int3;
      this.comb2 = c1;
      this.comb3 = c2;

      out[i] = c3 / 1000000;
    }

    return true;
  }
}

registerProcessor("pdm-player", PDMPlayer);
`;

const blob = new Blob(
  [worklet],
  { type: "application/javascript" }
);

await ctx.audioWorklet.addModule(
  URL.createObjectURL(blob)
);

const node =
  new AudioWorkletNode(ctx, "pdm-player");

node.connect(ctx.destination);

document.getElementById("file").onchange =
async e => {

  const buf =
    await e.target.files[0].arrayBuffer();

  const bytes =
    new Uint8Array(buf);

  // 元コードと同じくビット展開
  const bits =
    new Uint8Array(bytes.length * 8);

  let p = 0;

  for (let b of bytes) {
    for (let i = 0; i < 8; i++) {
      bits[p++] =
        (b >> (7 - i)) & 1;
    }
  }

  node.port.postMessage(bits);

  await ctx.resume();
};

})();
</script>

</body>
</html>
