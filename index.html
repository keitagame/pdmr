<!DOCTYPE html>
<html>
<body>

<input type="file" id="file">

<script>
const ctx = new AudioContext();

(async () => {

const workletCode = `

class PDMPlayer extends AudioWorkletProcessor {

  constructor() {
    super();

    this.bytes = null;

    this.bytePos = 0;
    this.bitPos = 0;

    this.OSR = 64;

    // CIC 3-stage
    this.int1 = 0;
    this.int2 = 0;
    this.int3 = 0;

    this.comb1 = 0;
    this.comb2 = 0;
    this.comb3 = 0;

    this.port.onmessage = e => {
      this.bytes = e.data;

      this.bytePos = 0;
      this.bitPos = 0;

      this.int1 = 0;
      this.int2 = 0;
      this.int3 = 0;

      this.comb1 = 0;
      this.comb2 = 0;
      this.comb3 = 0;
    };
  }

  getNextBit() {

    if (!this.bytes) return null;

    if (this.bytePos >= this.bytes.length)
      return null;

    const byte = this.bytes[this.bytePos];

    const bit =
      ((byte >> (7 - this.bitPos)) & 1)
        ? 1
        : -1;

    this.bitPos++;

    if (this.bitPos === 8) {
      this.bitPos = 0;
      this.bytePos++;
    }

    return bit;
  }

  process(inputs, outputs) {

    const out = outputs[0][0];

    if (!this.bytes) {
      out.fill(0);
      return true;
    }

    for (let i = 0; i < out.length; i++) {

      let ended = false;

      for (let j = 0; j < this.OSR; j++) {

        const bit = this.getNextBit();

        if (bit === null) {
          ended = true;
          break;
        }

        // CIC integrators (32bit wrap)

        this.int1 = (this.int1 + bit) | 0;
        this.int2 = (this.int2 + this.int1) | 0;
        this.int3 = (this.int3 + this.int2) | 0;
      }

      const c1 = (this.int3 - this.comb1) | 0;
      const c2 = (c1 - this.comb2) | 0;
      const c3 = (c2 - this.comb3) | 0;

      this.comb1 = this.int3;
      this.comb2 = c1;
      this.comb3 = c2;

      out[i] = c3 / 262144;

      if (ended) {

        for (let k = i + 1; k < out.length; k++) {
          out[k] = 0;
        }

        this.bytes = null;
        return true;
      }
    }

    return true;
  }
}

registerProcessor("pdm-player", PDMPlayer);

`;

const blob = new Blob(
  [workletCode],
  { type: "application/javascript" }
);

await ctx.audioWorklet.addModule(
  URL.createObjectURL(blob)
);

const node =
  new AudioWorkletNode(ctx, "pdm-player");

node.connect(ctx.destination);

document
  .getElementById("file")
  .addEventListener("change", async e => {

    const file = e.target.files[0];

    const buffer =
      await file.arrayBuffer();

    const bytes =
      new Uint8Array(buffer);

    node.port.postMessage(
      bytes,
      [bytes.buffer]
    );

    await ctx.resume();
  });

})();
</script>

</body>
</html>
