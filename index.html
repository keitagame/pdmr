<!DOCTYPE html>
<html>
<body>
<input type="file" id="file">
<script>
const ctx = new AudioContext();

(async () => {
  const worklet = `
  class PDMPlayer extends AudioWorkletProcessor {
    constructor() {
      super();
      this.data = [];
      this.pos = 0;

      // PDM の OSR（例：44.1kHz → 2.8224MHz = 64）
      this.OSR = 64;

      // IIR LPF
      this.y = 0;
      this.a = 0.02;

      this.port.onmessage = e => {
        this.data = e.data;
        this.pos = 0;
      };
    }

    process(_, outputs) {
      const out = outputs[0][0];

      for (let i = 0; i < out.length; i++) {
        let acc = 0;

        // OSR 分の PDM をまとめて 1PCM にする
        for (let j = 0; j < this.OSR; j++) {
          if (this.pos >= this.data.length) break;

          const bit = this.data[this.pos++] ? 1 : -1;

          // IIR LPF
          this.y = this.y + this.a * (bit - this.y);
          acc = this.y;
        }

        out[i] = acc;
      }

      return true;
    }
  }
  registerProcessor("pdm-player", PDMPlayer);
  `;

  const blob = new Blob([worklet], { type: "application/javascript" });
  await ctx.audioWorklet.addModule(URL.createObjectURL(blob));

  const node = new AudioWorkletNode(ctx, "pdm-player");
  node.connect(ctx.destination);

  document.getElementById("file").onchange = async e => {
    const buf = await e.target.files[0].arrayBuffer();
    const bytes = new Uint8Array(buf);

    // バイト → 1bit 展開
    const bits = new Uint8Array(bytes.length * 8);
    let p = 0;
    for (let b of bytes) {
      for (let i = 0; i < 8; i++) {
        bits[p++] = (b >> (7 - i)) & 1;
      }
    }

    node.port.postMessage(bits);
    ctx.resume();
  };
})();
</script>
</body>
</html>
